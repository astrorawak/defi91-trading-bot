<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeFi91 Bot Monitor</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0a0e17;
            --card: #111827;
            --border: #1f2937;
            --accent: #00f0ff;
            --accent2: #7c3aed;
            --green: #10b981;
            --red: #ef4444;
            --text: #e5e7eb;
            --muted: #6b7280;
        }
        
        body {
            font-family: 'SF Mono', 'Fira Code', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* Animated background grid */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                linear-gradient(rgba(0,240,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,240,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1;
        }
        
        /* Header */
        .header {
            text-align: center;
            padding: 30px 0;
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        
        .header .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 8px;
        }
        
        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--green);
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.5); }
        }
        
        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        
        .stat-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(0,240,255,0.1);
            transform: translateY(-2px);
        }
        
        .stat-card .label {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .stat-card .value {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 4px;
        }
        
        .stat-card .value.positive { color: var(--green); }
        .stat-card .value.negative { color: var(--red); }
        .stat-card .value.accent { color: var(--accent); }
        
        /* Chart Section */
        .chart-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }
        
        .chart-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent));
            background-size: 200% 100%;
            animation: shimmer 3s linear infinite;
        }
        
        @keyframes shimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }
        
        .chart-title {
            font-size: 0.85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
        }
        
        .chart-container {
            position: relative;
            height: 250px;
        }
        
        /* Position Cards */
        .positions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 12px;
            margin: 20px 0;
        }
        
        .position-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .position-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        .position-card.long { border-left: 3px solid var(--green); }
        .position-card.short { border-left: 3px solid var(--red); }
        
        .position-card .coin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .position-card .coin-name {
            font-size: 1.1rem;
            font-weight: 700;
        }
        
        .position-card .direction {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
        }
        
        .direction.long { background: rgba(16,185,129,0.15); color: var(--green); }
        .direction.short { background: rgba(239,68,68,0.15); color: var(--red); }
        
        .position-card .price-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: var(--muted);
            margin: 4px 0;
        }
        
        .position-card .price-row span:last-child {
            color: var(--text);
            font-weight: 500;
        }
        
        .position-card .pnl-bar {
            margin-top: 10px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .position-card .pnl-bar .fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.5s;
        }
        
        .position-card .pnl-bar .fill.positive { background: var(--green); }
        .position-card .pnl-bar .fill.negative { background: var(--red); }
        
        /* Activity Log */
        .activity-log {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            margin: 20px 0;
        }
        
        .log-entry {
            display: flex;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.8rem;
        }
        
        .log-entry:last-child { border-bottom: none; }
        
        .log-entry .time {
            color: var(--muted);
            min-width: 60px;
        }
        
        .log-entry .action {
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 0.7rem;
            font-weight: 600;
            margin: 0 8px;
            min-width: 50px;
            text-align: center;
        }
        
        .log-entry .action.entry { background: rgba(0,240,255,0.15); color: var(--accent); }
        .log-entry .action.exit { background: rgba(124,58,237,0.15); color: var(--accent2); }
        .log-entry .action.smart { background: rgba(245,158,11,0.15); color: #f59e0b; }
        .log-entry .action.trail { background: rgba(16,185,129,0.15); color: var(--green); }
        
        .log-entry .detail { color: var(--text); }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 20px;
            color: var(--muted);
            font-size: 0.7rem;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .stats-row { grid-template-columns: repeat(2, 1fr); }
            .positions-grid { grid-template-columns: 1fr; }
            .chart-container { height: 200px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>DeFi91</h1>
            <div class="subtitle">
                <span class="pulse-dot"></span>
                <span id="status">CONNECTING...</span> | 
                <span id="lastUpdate">--</span>
            </div>
        </div>
        
        <!-- Stats -->
        <div class="stats-row">
            <div class="stat-card">
                <div class="label">Balance</div>
                <div class="value accent" id="balance">--</div>
            </div>
            <div class="stat-card">
                <div class="label">Open Positions</div>
                <div class="value" id="openPositions">--</div>
            </div>
            <div class="stat-card">
                <div class="label">Total Trades</div>
                <div class="value" id="totalTrades">--</div>
            </div>
            <div class="stat-card">
                <div class="label">Win Rate</div>
                <div class="value" id="winRate">--</div>
            </div>
            <div class="stat-card">
                <div class="label">Net PnL</div>
                <div class="value" id="netPnl">--</div>
            </div>
        </div>
        
        <!-- PnL Chart -->
        <div class="chart-section">
            <div class="chart-title">Equity Curve</div>
            <div class="chart-container">
                <canvas id="pnlChart"></canvas>
            </div>
        </div>
        
        <!-- Trade Distribution Chart -->
        <div class="chart-section">
            <div class="chart-title">Trade Activity</div>
            <div class="chart-container">
                <canvas id="activityChart"></canvas>
            </div>
        </div>
        
        <!-- Active Positions -->
        <div class="chart-section">
            <div class="chart-title">Active Positions</div>
            <div class="positions-grid" id="positionsGrid">
            </div>
        </div>
        
        <!-- Activity Log -->
        <div class="activity-log">
            <div class="chart-title">Bot Activity Log</div>
            <div id="activityLog">
            </div>
        </div>
        
        <!-- Footer -->
        <div class="footer">
            DeFi91 Trading Bot &bull; Strategy: Almarhum Doddy Ali Wijaya + KJo Academy<br>
            Auto-refresh every 60s
        </div>
    </div>
    
    <script>
        let pnlChart, activityChart;
        
        async function loadData() {
            try {
                const resp = await fetch('trades.json?t=' + Date.now());
                const data = await resp.json();
                updateDashboard(data);
            } catch (e) {
                document.getElementById('status').textContent = 'OFFLINE';
            }
        }
        
        function updateDashboard(data) {
            document.getElementById('status').textContent = data.bot_status || 'ACTIVE';
            document.getElementById('lastUpdate').textContent = data.last_update || '--';
            
            const trades = data.trades || [];
            const openTrades = trades.filter(t => t.status === 'OPEN');
            const closedTrades = trades.filter(t => t.status === 'CLOSED');
            
            document.getElementById('balance').textContent = '$' + (data.balance || '54.75');
            document.getElementById('openPositions').textContent = openTrades.length;
            document.getElementById('totalTrades').textContent = trades.length;
            
            const wins = closedTrades.filter(t => (t.pnl || 0) > 0).length;
            const wr = closedTrades.length > 0 ? Math.round(wins / closedTrades.length * 100) : 0;
            document.getElementById('winRate').textContent = closedTrades.length > 0 ? wr + '%' : '--';
            
            const netPnl = closedTrades.reduce((sum, t) => sum + (t.pnl || 0), 0);
            const pnlEl = document.getElementById('netPnl');
            pnlEl.textContent = closedTrades.length > 0 ? ((netPnl >= 0 ? '+' : '') + netPnl.toFixed(4) + '$') : '--';
            pnlEl.className = 'value ' + (netPnl >= 0 ? 'positive' : 'negative');
            
            renderPositions(openTrades);
            renderLog(trades);
            renderPnlChart(trades);
            renderActivityChart(trades);
        }
        
        function renderPositions(positions) {
            const grid = document.getElementById('positionsGrid');
            if (positions.length === 0) {
                grid.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;width:100%;">No open positions</p>';
                return;
            }
            
            grid.innerHTML = positions.map(p => {
                const isLong = (p.signal || '').toUpperCase() === 'LONG';
                const dir = isLong ? 'long' : 'short';
                const entry = parseFloat(p.entry) || 0;
                const tp = parseFloat(p.tp) || 0;
                const sl = parseFloat(p.sl) || 0;
                const range = Math.abs(tp - sl);
                const progress = range > 0 ? Math.min(100, Math.max(0, Math.abs(entry - sl) / range * 100)) : 50;
                
                return `
                <div class="position-card ${dir}">
                    <div class="coin-header">
                        <span class="coin-name">${p.coin}</span>
                        <span class="direction ${dir}">${dir.toUpperCase()}</span>
                    </div>
                    <div class="price-row"><span>Entry</span><span>$${entry}</span></div>
                    <div class="price-row"><span>TP</span><span style="color:var(--green)">$${tp}</span></div>
                    <div class="price-row"><span>SL</span><span style="color:var(--red)">$${sl}</span></div>
                    <div class="price-row"><span>Margin</span><span>$${p.margin || '1.5'} (${p.leverage || '10'}x)</span></div>
                    <div class="pnl-bar"><div class="fill ${isLong ? 'positive' : 'negative'}" style="width:${progress}%"></div></div>
                </div>`;
            }).join('');
        }
        
        function renderLog(trades) {
            const log = document.getElementById('activityLog');
            const recent = trades.slice(-12).reverse();
            
            log.innerHTML = recent.map(t => {
                const time = (t.time || '').split(' ')[1] || '--:--';
                let actionClass = 'entry';
                let actionText = 'ENTRY';
                
                if (t.status === 'CLOSED') {
                    actionClass = (t.pnl || 0) >= 0 ? 'exit' : 'smart';
                    actionText = (t.pnl || 0) >= 0 ? 'TP HIT' : 'SL HIT';
                }
                if (t.action === 'SMART_EXIT') {
                    actionClass = 'smart';
                    actionText = 'SMART';
                }
                if (t.action === 'TRAILING_STOP') {
                    actionClass = 'trail';
                    actionText = 'TRAIL';
                }
                
                const signal = (p => p === 'LONG' ? 'LONG' : p === 'SHORT' ? 'SHORT' : p)((t.signal || '').toUpperCase());
                return `
                <div class="log-entry">
                    <span class="time">${time}</span>
                    <span class="action ${actionClass}">${actionText}</span>
                    <span class="detail">${t.coin} ${signal} @ $${t.entry || '--'}</span>
                </div>`;
            }).join('');
            
            if (recent.length === 0) {
                log.innerHTML = '<p style="color:var(--muted);text-align:center;padding:20px;">No activity yet</p>';
            }
        }
        
        function renderPnlChart(trades) {
            const ctx = document.getElementById('pnlChart').getContext('2d');
            
            let cumPnl = 0;
            const labels = ['Start'];
            const dataPoints = [0];
            
            trades.forEach((t, i) => {
                cumPnl += (t.pnl || 0);
                labels.push(t.coin || `#${i+1}`);
                dataPoints.push(parseFloat(cumPnl.toFixed(4)));
            });
            
            if (pnlChart) pnlChart.destroy();
            
            const gradient = ctx.createLinearGradient(0, 0, 0, 250);
            gradient.addColorStop(0, 'rgba(0,240,255,0.2)');
            gradient.addColorStop(1, 'rgba(0,240,255,0)');
            
            pnlChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        data: dataPoints,
                        borderColor: '#00f0ff',
                        borderWidth: 2,
                        backgroundColor: gradient,
                        fill: true,
                        tension: 0.4,
                        pointRadius: 3,
                        pointBackgroundColor: '#00f0ff',
                        pointBorderColor: '#0a0e17',
                        pointBorderWidth: 2,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#1f2937',
                            borderColor: '#374151',
                            borderWidth: 1,
                            titleColor: '#e5e7eb',
                            bodyColor: '#e5e7eb',
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#6b7280', font: { size: 10 } }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { 
                                color: '#6b7280', 
                                font: { size: 10 },
                                callback: v => '$' + v.toFixed(2)
                            }
                        }
                    }
                }
            });
        }
        
        function renderActivityChart(trades) {
            const ctx = document.getElementById('activityChart').getContext('2d');
            
            const coinCounts = {};
            trades.forEach(t => {
                const coin = t.coin || 'Unknown';
                coinCounts[coin] = (coinCounts[coin] || 0) + 1;
            });
            
            const coins = Object.keys(coinCounts);
            const counts = Object.values(coinCounts);
            
            const colors = coins.map((_, i) => {
                const hue = (i * 137.5) % 360;
                return `hsla(${hue}, 70%, 60%, 0.8)`;
            });
            
            if (activityChart) activityChart.destroy();
            
            activityChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: coins,
                    datasets: [{
                        data: counts,
                        backgroundColor: colors,
                        borderRadius: 6,
                        borderSkipped: false,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: {
                            grid: { display: false },
                            ticks: { color: '#6b7280', font: { size: 11, weight: 'bold' } }
                        },
                        y: {
                            grid: { color: 'rgba(255,255,255,0.05)' },
                            ticks: { color: '#6b7280', stepSize: 1, font: { size: 10 } }
                        }
                    }
                }
            });
        }
        
        loadData();
        setInterval(loadData, 60000);
    </script>
</body>
</html>
