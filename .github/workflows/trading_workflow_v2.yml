name: DeFi91 Trading Bot

on:
  schedule:
    # Jadwal tepat sasaran - jam volatilitas tinggi crypto:
    # Sesi Asia Open (08:00-10:00 WIB = 01:00-03:00 UTC)
    - cron: '0 0 * * 0'   # 07:00 WIB (Minggu) - Weekly Insights Telegram
    - cron: '0 0 * * *'   # 07:00 WIB - Daily Report Telegram
    - cron: '0 1 * * *'   # 08:00 WIB - Asia market open
    - cron: '30 2 * * *'  # 09:30 WIB - Asia momentum peak
    # Sesi London Open (14:00-16:00 WIB = 07:00-09:00 UTC)
    - cron: '0 7 * * *'   # 14:00 WIB - London open (volatilitas tinggi)
    - cron: '30 8 * * *'  # 15:30 WIB - London momentum
    # Sesi New York Open (20:00-22:00 WIB = 13:00-15:00 UTC)
    - cron: '0 13 * * *'  # 20:00 WIB - NY open (volatilitas tertinggi)
    - cron: '30 14 * * *' # 21:30 WIB - NY momentum peak
    # Sesi Overlap & Late Night
    - cron: '0 16 * * *'  # 23:00 WIB - Late NY / crypto whale hour
    - cron: '0 19 * * *'  # 02:00 WIB - Asia late night (big moves)
    - cron: '0 22 * * *'  # 05:00 WIB - Pre-Asia open
  workflow_dispatch:

jobs:
  trade:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests numpy eth-account hyperliquid-python-sdk

      - name: Run Trading Bot
        env:
          HYPERLIQUID_ADDRESS: ${{ secrets.HYPERLIQUID_ADDRESS }}
          HYPERLIQUID_PRIVATE_KEY: ${{ secrets.HYPERLIQUID_PRIVATE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python github_bot_v2.py

      - name: Run Grid Bot
        env:
          HYPERLIQUID_ADDRESS: ${{ secrets.HYPERLIQUID_ADDRESS }}
          HYPERLIQUID_PRIVATE_KEY: ${{ secrets.HYPERLIQUID_PRIVATE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python grid_bot.py

      - name: Commit and push trades data
        run: |
          git config --local user.email "bot@defi91.local"
          git config --local user.name "DeFi91 Bot"
          git add trades.json performance.json market_regime.json grid_trades.json || true
          git diff --staged --quiet || git commit -m "Auto: Update trades - $(date '+%Y-%m-%d %H:%M')"
          git push || true

      - name: Send Daily Telegram Report
        if: github.event.schedule == '0 0 * * *' || github.event.schedule == '0 0 * * 0'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python telegram_reporter.py
          if [ "$(date +'%u')" = "7" ]; then
            python weekly_insights.py
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          keep_files: true
